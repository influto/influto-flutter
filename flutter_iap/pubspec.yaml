name: influto_iap
description: >-
  Automatic store-purchase capture for the InfluTo Flutter SDK: listens to
  in_app_purchase and reports each purchase to InfluTo, so store-direct apps need
  no manual reporting.
version: 1.0.0
homepage: https://influ.to
repository: https://github.com/influto/influto-flutter
topics: [attribution, affiliate, influencer, in-app-purchase, revenuecat]

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  influto: "^1.0.0"
  in_app_purchase: ">=3.3.0 <4.0.0"
  in_app_purchase_android: ">=0.5.0 <0.6.0"
  in_app_purchase_storekit: ">=0.4.0 <0.5.0"
  shared_preferences: ">=2.0.0 <3.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=4.0.0 <6.0.0"
