name: influto_example
description: Reference app for the InfluTo Flutter SDK (attribution + store-direct purchase).
publish_to: none
version: 1.0.0

environment:
  # in_app_purchase ^3.3 (StoreKit 2) requires a recent Flutter/Dart. The published
  # `influto` package keeps a broader constraint; only this example needs the newer SDK.
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  influto:
    path: ../packages/influto
  # Opt-in auto-capture companion (InfluToPurchaseObserver), vendored in this repo.
  influto_iap:
    path: ../packages/influto_iap
  # Official IAP plugin. StoreKit 2 is the default on iOS 15+ (exposes the JWS at
  # verificationData.serverVerificationData); Android exposes the purchaseToken.
  in_app_purchase: ^3.3.0
  in_app_purchase_android: ^0.5.0
  in_app_purchase_storekit: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

# This example builds against LOCAL source for both packages. influto_iap declares a
# hosted `influto: ^1.0.0` (required so it publishes correctly), so without this override
# pub refuses to mix the path + hosted sources for influto. Forcing influto to local source
# is allowed here because the example is publish_to: none.
dependency_overrides:
  influto:
    path: ../packages/influto
